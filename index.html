<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif
}

body{
background:#343541;
color:#fff;
height:100vh;
display:flex;
flex-direction:column
}

header{
padding:16px;
text-align:center;
font-weight:600;
font-size:18px;
border-bottom:1px solid #444654;
background:#202123
}

main{
flex:1;
overflow-y:auto;
padding:20px 0;
display:flex;
flex-direction:column;
align-items:center
}

.chat-container{
width:100%;
max-width:800px;
display:flex;
flex-direction:column;
gap:20px;
padding:0 20px
}

.message-wrapper{
width:100%;
display:flex
}

.message-wrapper.user{
justify-content:flex-end
}

.message-wrapper.bot{
justify-content:flex-start
}

.message{
padding:14px 18px;
border-radius:8px;
max-width:80%;
line-height:1.6;
font-size:15px
}

.message-wrapper.user .message{
background:#444654
}

.message-wrapper.bot .message{
background:#3e3f4b
}

footer{
padding:16px;
background:#343541;
border-top:1px solid #444654;
display:flex;
justify-content:center
}

.input-area{
width:100%;
max-width:800px;
display:flex;
background:#40414f;
border-radius:8px;
padding:10px;
align-items:center
}

.input-area input{
flex:1;
background:transparent;
border:none;
color:#fff;
font-size:15px;
outline:none
}

.input-area input::placeholder{
color:#8e8ea0
}

.send-btn{
background:transparent;
border:none;
color:#19c37d;
font-size:22px;
cursor:pointer;
padding:8px 12px
}

.send-btn:hover{
opacity:.7
}

.chat-start{
text-align:center;
color:#8e8ea0;
margin-top:40px
}

@media(max-width:600px){
.message{
max-width:95%
}
}
</style>
</head>

<body>

<header>
Country AI
</header>

<main>
<div class="chat-container" id="chatContainer"></div>
</main>

<footer>
<div class="input-area">
<input type="text" placeholder="پیام خود را بنویسید..." id="userInput">
<button class="send-btn" id="sendBtn">↑</button>
</div>
</footer>

<script>
// ===== API (بدون تغییر) =====
const API_URL = "https://api.gapgpt.app/v1/chat/completions";
const API_KEY = "sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa";

let chats = [];
let currentId = null;

function newChat(){
const chat={id:Date.now()+'',messages:[]};
chats=[chat];
currentId=chat.id;
renderChat();
}

function renderChat(){
const chat=chats.find(c=>c.id===currentId);
const container=document.getElementById('chatContainer');
if(!chat)return;
container.innerHTML='';
if(chat.messages.length===0){
container.innerHTML='<div class="chat-start">شروع گفتگو...</div>';
}else{
chat.messages.forEach(m=>{
const wrap=document.createElement('div');
wrap.className=`message-wrapper ${m.type}`;
const msg=document.createElement('div');
msg.className="message";
msg.textContent=m.text;
wrap.appendChild(msg);
container.appendChild(wrap);
});
}
container.scrollTop=container.scrollHeight;
}

async function sendToAPI(message){
try{
const res=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:"gpt-4o",
messages:[{role:"user",content:message}]
})
});
const data=await res.json();
return data.choices?.[0]?.message?.content || "⚠️ بدون پاسخ";
}catch(e){
return "❌ خطا در ارتباط با سرور";
}
}

async function sendMessage(){
const input=document.getElementById('userInput');
const text=input.value.trim();
if(!text)return;
const chat=chats.find(c=>c.id===currentId);
chat.messages.push({type:'user',text});
input.value='';
renderChat();
const response=await sendToAPI(text);
chat.messages.push({type:'bot',text:response});
renderChat();
}

document.getElementById('sendBtn').onclick=sendMessage;
document.getElementById('userInput').onkeypress=(e)=>{
if(e.key==='Enter'){
e.preventDefault();
sendMessage();
}
};

newChat();
</script>

</body>
</html>
