<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tekno hosh</title>
<style>
:root{
  --bg:#0f172a; --panel:#1e293b; --text:#e2e8f0; --accent:#00f0ff;
}
.light{
  --bg:#f1f5f9; --panel:#e2e8f0; --text:#0f172a; --accent:#0ea5e9;
}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;}
header{padding:15px;display:flex;justify-content:space-between;align-items:center;background:var(--panel);}
.logo{font-weight:bold;font-size:18px;}
.controls button{margin-left:5px;}
button{padding:6px 10px;border:none;border-radius:8px;background:var(--accent);color:black;cursor:pointer;}
#chatBox{flex:1;overflow-y:auto;padding:15px;}
.message{margin-bottom:15px;padding:10px;border-radius:12px;background:var(--panel);position:relative;white-space:pre-wrap;}
.user{ background:#334155;}
.bot{ background:#1e293b;}
.copyBtn{position:absolute;top:5px;right:5px;font-size:12px;cursor:pointer;}
pre{background:#111827;padding:10px;border-radius:8px;overflow:auto;}
input{padding:12px;border:none;outline:none;width:100%;background:var(--panel);color:var(--text);}
footer{display:flex;}
img.generated{max-width:100%;border-radius:10px;margin-top:10px;}
a.downloadImage{display:block;margin-top:5px;text-decoration:none;color:var(--accent);}
.loading{display:flex;gap:5px;margin:5px;}
.loading span{width:10px;height:10px;background:var(--accent);border-radius:50%;animation:bounce 1.4s infinite;}
.loading span:nth-child(2){animation-delay:0.2s;}
.loading span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
</style>
</head>
<body>

<header>
<div class="logo" id="logo">tekno hosh</div>
<div class="controls">
<button onclick="toggleMode()">🌗</button>
<button onclick="toggleLang()">🌍</button>
<button onclick="newChat()">🆕 چت جدید</button>
<button onclick="generateImage()">🖼 تصویر بساز</button>
</div>
</header>

<div id="chatBox"></div>

<footer>
<input id="userInput" placeholder="پیام بنویس...">
<button onclick="sendMessage()">➤</button>
</footer>

<script>
// === تنظیمات API ===
const CHAT_API_KEY = "sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa";
const CHAT_URL = "https://api.gapgpt.app/v1/chat/completions";

const KIE_API_KEY = "18cffc5cac976d097599d7bb152f9605";
const KIE_URL = "https://api.kie.ai/api/v1/jobs/createTask";

// === مدیریت چت ===
let messages=[];
let userId = localStorage.getItem("teknoUserId");
if(!userId){
  userId="user_"+Math.random().toString(36).substring(2);
  localStorage.setItem("teknoUserId",userId);
}
function saveMessages(){ localStorage.setItem("tekno_"+userId,JSON.stringify(messages)); }
function loadMessages(){ 
  const saved = localStorage.getItem("tekno_"+userId);
  if(saved){ messages=JSON.parse(saved); render(); }
}

function render(){
  const box=document.getElementById("chatBox");
  box.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="message "+m.role;
    div.innerHTML=formatMessage(m.text);
    if(m.image){
      const img = document.createElement("img");
      img.src=m.image;
      img.className="generated";
      div.appendChild(img);
      const a = document.createElement("a");
      a.href=m.image; a.download="image.png"; a.innerText="⬇ دانلود تصویر";
      a.className="downloadImage";
      div.appendChild(a);
    }
    addCopy(div,m.text);
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
}

function formatMessage(text){
  if(text.includes("```")){
    return text.replace(/```(.*?)```/gs, `<pre><code>$1</code></pre>`);
  }
  return text;
}

function addCopy(div,text){
  const btn=document.createElement("span");
  btn.innerText="📋";
  btn.className="copyBtn";
  btn.onclick=()=>navigator.clipboard.writeText(text);
  div.appendChild(btn);
}

function addMessage(role,text,image=null){
  messages.push({role,text,image});
  render();
  saveMessages();
}

// === تایپ انیمیشن ===
async function typeMessage(div,text){
  div.innerHTML="";
  for(let i=0;i<text.length;i++){
    div.innerHTML+=text[i];
    await new Promise(r=>setTimeout(r,20)); // سرعت تایپ
  }
}

// === ارسال پیام ===
async function sendMessage(){
  const input=document.getElementById("userInput");
  const msg=input.value.trim();
  if(!msg) return;
  addMessage("user",msg);
  input.value="";
  
  const botMsg={role:"bot",text:"",image:null};
  messages.push(botMsg);
  render();
  const botDiv = document.querySelector("#chatBox .bot:last-child");
  botDiv.innerHTML='<div class="loading"><span></span><span></span><span></span></div>';

  try{
    const res = await fetch(CHAT_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+CHAT_API_KEY
      },
      body: JSON.stringify({model:"gpt-4o", messages:[{role:"user", content: msg}]})
    });
    const data = await res.json();
    botMsg.text = data.choices[0].message.content;
    botDiv.innerHTML="";
    await typeMessage(botDiv, botMsg.text);
    saveMessages();
  }catch(e){
    botMsg.text="❌ خطا در اتصال API";
    botDiv.innerHTML=botMsg.text;
    console.error(e);
  }
}

// === ساخت تصویر ===
async function generateImage(){
  const input=document.getElementById("userInput");
  const msg=input.value.trim();
  if(!msg) return;
  addMessage("user",msg);
  input.value="";

  const botMsg={role:"bot",text:"در حال ساخت تصویر...",image:null};
  messages.push(botMsg);
  render();

  try{
    const imgRes = await fetch(KIE_URL,{
      method: 'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+KIE_API_KEY
      },
      body: JSON.stringify({
        model: 'nano-banana-pro',
        input:{
          prompt: msg,
          aspect_ratio:"1:1",
          resolution:"1K",
          output_format:"png"
        }
      })
    });
    const imgData = await imgRes.json();
    if(imgData.output_url){
      messages.pop();
      addMessage("bot","تصویر آماده شد", imgData.output_url);
    }
  }catch(e){
    messages.pop();
    addMessage("bot","❌ خطا در ساخت تصویر");
    console.error(e);
  }
}

// === چت جدید ===
function newChat(){
  messages = [];
  saveMessages();
  render();
  addMessage("bot","سلام! چت جدید آماده است.");
}

// === دارک/لایت و فارسی/انگلیسی ===
function toggleMode(){ document.body.classList.toggle("light"); }
function toggleLang(){
  const logo=document.getElementById("logo");
  const input=document.getElementById("userInput");
  if(logo.innerText==="tekno hosh"){
    logo.innerText="تکنو هوش";
    input.placeholder="پیام بنویس...";
  }else{
    logo.innerText="tekno hosh";
    input.placeholder="Type a message...";
  }
}

document.getElementById("userInput")
.addEventListener("keypress", e=>{
  if(e.key==="Enter"){ e.preventDefault(); sendMessage(); }
});

loadMessages();
</script>
</body>
</html>
