<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nora AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
:root{
--bg1:#000;--bg2:#0a0a0a;--text:#fff;--glass:rgba(25,25,35,.95);
--border:rgba(255,255,255,.1);--accent:#00e0ff;--accent2:#a06eff;
--user:rgba(0,100,255,.25);--bot:rgba(150,50,255,.25)
}
.light{
--bg1:#fff;--bg2:#f5f5ff;--text:#000;--glass:rgba(255,255,255,.95);
--border:rgba(0,0,0,.1);--user:rgba(0,100,255,.1);--bot:rgba(150,50,255,.1)
}
body{
min-height:100vh;
display:flex;flex-direction:column;
background:linear-gradient(145deg,var(--bg1),var(--bg2));
color:var(--text);
overflow-x:hidden
}
header,footer{
padding:14px 18px;
background:var(--glass);
border-bottom:1px solid var(--border)
}
footer{border-top:1px solid var(--border);border-bottom:none}
.logo{
font-weight:700;
font-size:1.8rem;
background:linear-gradient(145deg,#fff,var(--accent),var(--accent2));
-webkit-background-clip:text;color:transparent
}
.menu-btn{
font-size:1.8rem;cursor:pointer;background:none;border:none;color:var(--text)
}
.menu{
display:none;flex-direction:column;gap:8px;margin-top:10px
}
.menu button{
background:rgba(255,255,255,.08);
border:1px solid var(--border);
padding:10px;border-radius:20px;color:var(--text);cursor:pointer
}
#chatBox{
flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px
}
.message-wrapper{display:flex;flex-direction:column}
.message-wrapper.user{align-items:flex-end}
.message{
max-width:85%;padding:14px 18px;border-radius:18px;
line-height:1.6;border:1px solid var(--border)
}
.user .message{background:var(--user)}
.bot .message{background:var(--bot)}
.copy-message-btn{
margin-top:4px;font-size:.8rem;
background:rgba(255,255,255,.08);
border:1px solid var(--border);
padding:5px 12px;border-radius:15px;color:var(--text);cursor:pointer
}
.typing-indicator{
display:flex;gap:6px;padding:12px 18px;
background:var(--bot);border-radius:18px
}
.typing-indicator span{
width:8px;height:8px;background:var(--accent);
border-radius:50%;animation:bounce 1.2s infinite
}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes bounce{
0%,80%,100%{transform:translateY(0)}
40%{transform:translateY(-6px)}
}
.input-wrapper{
display:flex;align-items:center;gap:8px;
background:var(--glass);
padding:6px 10px;border-radius:40px;border:1px solid var(--border)
}
input{
flex:1;border:none;background:none;
color:var(--text);font-size:1rem;outline:none
}
.send-btn{
width:45px;height:45px;border-radius:50%;
border:1px solid var(--border);
background:rgba(255,255,255,.08);
color:var(--text);cursor:pointer
}
</style>
</head>

<body>

<header>
<div class="logo">✨ NØRΛ ⚡</div>
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div class="menu" id="menu">
<button onclick="toggleMode()">🌗 تغییر تم</button>
<button onclick="newChat()">🆕 چت جدید</button>
</div>
</header>

<div id="chatBox"></div>

<footer>
<div class="input-wrapper">
<input id="userInput" placeholder="پیام بنویس ...">
<button class="send-btn" onclick="sendMessage()">➤</button>
</div>
</footer>

<script>
let menuVisible=false,isTyping=false,typingEl=null;
const chatBox=document.getElementById("chatBox");
const userInput=document.getElementById("userInput");
function toggleMenu(){
menuVisible=!menuVisible;
document.getElementById("menu").style.display=menuVisible?"flex":"none"
}
function toggleMode(){document.body.classList.toggle("light")}
function newChat(){chatBox.innerHTML=""}
function addMessage(role,text){
const wrap=document.createElement("div");
wrap.className="message-wrapper "+role;
const msg=document.createElement("div");
msg.className="message";
msg.textContent=text;
wrap.appendChild(msg);
const btn=document.createElement("button");
btn.className="copy-message-btn";
btn.innerText="📋 کپی";
btn.onclick=()=>navigator.clipboard.writeText(text);
wrap.appendChild(btn);
chatBox.appendChild(wrap);
chatBox.scrollTop=chatBox.scrollHeight
}
function showTyping(){
if(isTyping)return;
isTyping=true;
typingEl=document.createElement("div");
typingEl.className="message-wrapper bot";
const box=document.createElement("div");
box.className="typing-indicator";
for(let i=0;i<3;i++)box.appendChild(document.createElement("span"));
typingEl.appendChild(box);
chatBox.appendChild(typingEl);
chatBox.scrollTop=chatBox.scrollHeight
}
function hideTyping(){
if(typingEl)typingEl.remove();
isTyping=false
}
async function sendMessage(){
const msg=userInput.value.trim();
if(!msg)return;
addMessage("user",msg);
userInput.value="";
showTyping();
try{
const res=await fetch("https://api.gapgpt.app/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa"
},
body:JSON.stringify({
model:"gpt-4o",
messages:[{role:"user",content:msg}]
})
});
const data=await res.json();
hideTyping();
addMessage("bot",data.choices?.[0]?.message?.content||"⚠️ بدون پاسخ");
}catch{
hideTyping();
addMessage("bot","❌ خطا در ارتباط")
}
}
userInput.addEventListener("keypress",e=>{
if(e.key==="Enter"){e.preventDefault();sendMessage()}
});
</script>

</body>
</html>
