<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School GPT</title>

<style>
body{
    font-family:tahoma;
    background:#111;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:900px;
    height:90vh;
    background:#1e1e1e;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    padding:15px;
    background:#222;
    text-align:center;
    font-weight:bold;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.message{
    margin-bottom:12px;
}

.user{
    text-align:right;
}

.ai{
    text-align:left;
}

.bubble{
    display:inline-block;
    padding:10px 15px;
    border-radius:15px;
    max-width:70%;
}

.user .bubble{
    background:#2979ff;
}

.ai .bubble{
    background:#333;
}

.input-area{
    display:flex;
    padding:10px;
    background:#222;
}

textarea{
    flex:1;
    resize:none;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    margin-right:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#2979ff;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">امیرمحمد جوانمرد/امیریاشار محرابی  </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <textarea id="input" rows="1" placeholder="سوال بپرس..."></textarea>
        <button onclick="sendMessage()">ارسال</button>
    </div>
</div>

<script>

const API_KEY = "sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa";

let history = [
    { role: "system", content: "تو یک دستیار مفید هستی." }
];

function addMessage(text, type){
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 999999;
}

async function sendMessage(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMessage(text, "user");
    input.value = "";

    try{

        const response = await fetch("https://api.gapgpt.app/v1", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [...history, { role: "user", content: text }],
                temperature: 0.7
            })
        });

        const data = await response.json();

        if(data.error){
            addMessage("خطا: " + data.error.message, "ai");
            return;
        }

        const reply = data.choices[0].message.content;
        addMessage(reply, "ai");

        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: reply });

    }catch(error){
        addMessage("خطا در اتصال به سرور", "ai");
        console.error(error);
    }
}

</script>

</body>
</html>
