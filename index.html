<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tekno hosh</title>

<style>
:root{
  --bg:#0f172a;
  --panel:#1e293b;
  --text:#e2e8f0;
  --accent:#00f0ff;
}
.light{
  --bg:#f1f5f9;
  --panel:#e2e8f0;
  --text:#0f172a;
  --accent:#0ea5e9;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}
header{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--panel);
}
.logo{
  font-weight:bold;
  font-size:18px;
}
.controls button{
  margin-left:5px;
}
button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:black;
  cursor:pointer;
}
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:15px;
}
.message{
  margin-bottom:15px;
  padding:10px;
  border-radius:12px;
  background:var(--panel);
  position:relative;
}
.user{ background:#334155;}
.bot{ background:#1e293b;}
.copyBtn{
  position:absolute;
  top:5px;
  right:5px;
  font-size:12px;
  cursor:pointer;
}
pre{
  background:#111827;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}
input{
  padding:12px;
  border:none;
  outline:none;
  width:100%;
  background:var(--panel);
  color:var(--text);
}
footer{
  display:flex;
}
</style>
</head>
<body>

<header>
<div class="logo" id="logo">tekno hosh</div>
<div class="controls">
<button onclick="toggleMode()">🌗</button>
<button onclick="toggleLang()">🌍</button>
<button onclick="setMode('chat')">Chat</button>
<button onclick="setMode('image')">Image</button>
</div>
</header>

<div id="chatBox"></div>

<footer>
<input id="userInput" placeholder="پیام بنویس...">
<button onclick="sendMessage()">➤</button>
</footer>

<script>
const API_KEY = "PUT_YOUR_GAPGPT_API_KEY_HERE";
const GAPGPT_URL = "https://api.gapgpt.app/v1/chat/completions";

const IMAGE_API_URL = ""; // ← اینو خودت بزار
const IMAGE_API_KEY = ""; // ← اینو خودت بزار

let currentMode="chat";
let messages=[];
let userId = localStorage.getItem("teknoUserId");
if(!userId){
  userId="user_"+Math.random().toString(36).substring(2);
  localStorage.setItem("teknoUserId",userId);
}

function saveMessages(){
  localStorage.setItem("tekno_"+userId,JSON.stringify(messages));
}
function loadMessages(){
  const saved=localStorage.getItem("tekno_"+userId);
  if(saved){
    messages=JSON.parse(saved);
    render();
  }
}
function render(){
  const box=document.getElementById("chatBox");
  box.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="message "+m.role;
    div.innerHTML=formatMessage(m.text);
    addCopy(div,m.text);
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
}
function formatMessage(text){
  if(text.includes("```")){
    return text.replace(/```(.*?)```/gs,
      `<pre><code>$1</code></pre>`
    );
  }
  return text;
}
function addCopy(div,text){
  const btn=document.createElement("span");
  btn.innerText="📋";
  btn.className="copyBtn";
  btn.onclick=()=>navigator.clipboard.writeText(text);
  div.appendChild(btn);
}
function addMessage(role,text){
  messages.push({role,text});
  render();
  saveMessages();
}
async function sendMessage(){
  const input=document.getElementById("userInput");
  const msg=input.value.trim();
  if(!msg)return;
  addMessage("user",msg);
  input.value="";
  if(currentMode==="chat"){
    await sendChat(msg);
  }else{
    await generateImage(msg);
  }
}
async function sendChat(msg){
  addMessage("bot","⏳...");
  const res=await fetch(GAPGPT_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o",
      messages:[{role:"user",content:msg}]
    })
  });
  const data=await res.json();
  messages.pop();
  addMessage("bot",data.choices[0].message.content);
}
async function generateImage(prompt){
  addMessage("bot","🎨 در حال ساخت تصویر...");
  const res=await fetch(IMAGE_API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+IMAGE_API_KEY
    },
    body:JSON.stringify({prompt})
  });
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  messages.pop();
  addMessage("bot",`<img src="${url}" style="max-width:100%"><br><a href="${url}" download>⬇ دانلود تصویر</a>`);
}
function setMode(m){currentMode=m;}
function toggleMode(){
  document.body.classList.toggle("light");
}
function toggleLang(){
  const logo=document.getElementById("logo");
  if(logo.innerText==="tekno hosh"){
    logo.innerText="تکنو هوش";
    document.getElementById("userInput").placeholder="پیام بنویس...";
  }else{
    logo.innerText="tekno hosh";
    document.getElementById("userInput").placeholder="Type a message...";
  }
}
document.getElementById("userInput")
.addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    sendMessage();
  }
});
loadMessages();
</script>
</body>
</html>
