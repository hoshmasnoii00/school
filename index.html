<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nora AI</title>

<style>
:root{
  --bg: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  --glass: rgba(255,255,255,0.08);
  --text:#ffffff;
  --accent:#00f0ff;
}

.light{
  --bg: linear-gradient(135deg,#e0f7ff,#fdfbfb);
  --glass: rgba(255,255,255,0.6);
  --text:#111;
  --accent:#0077ff;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  background-attachment:fixed;
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
  transition:0.4s;
}

/* Glass Header */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  backdrop-filter: blur(15px);
  background:var(--glass);
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.logo{
  font-weight:bold;
  font-size:18px;
  letter-spacing:1px;
}

/* Menu Button */
.menu-btn{
  font-size:22px;
  cursor:pointer;
  transition:0.3s;
}
.menu-btn:hover{
  color:var(--accent);
}

/* Popup Menu */
.menu{
  position:absolute;
  top:70px;
  right:15px;
  backdrop-filter: blur(20px);
  background:var(--glass);
  border-radius:15px;
  padding:15px;
  display:none;
  flex-direction:column;
  gap:10px;
  animation:fadeIn 0.3s ease;
  border:1px solid rgba(255,255,255,0.2);
}

.menu button{
  background:transparent;
  border:1px solid var(--accent);
  color:var(--text);
  padding:8px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.menu button:hover{
  background:var(--accent);
  color:#000;
  transform:scale(1.05);
}

/* Chat Box */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  margin-bottom:15px;
  padding:12px;
  border-radius:15px;
  backdrop-filter: blur(12px);
  background:var(--glass);
  animation:slideUp 0.4s ease;
  white-space:pre-wrap;
}

.user{
  border-left:4px solid var(--accent);
}

.bot{
  border-left:4px solid #ff00ff;
}

/* Footer */
footer{
  display:flex;
  padding:10px;
  backdrop-filter: blur(15px);
  background:var(--glass);
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:var(--text);
  outline:none;
}

button.send-btn{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  cursor:pointer;
  transition:0.3s;
}

button.send-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px var(--accent);
}

img.generated{
  max-width:100%;
  margin-top:10px;
  border-radius:10px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<header>
<div class="logo" id="logo">Nora AI</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="menu" id="menu">
<button onclick="toggleMode()">🌗 تغییر تم</button>
<button onclick="toggleLang()">🌍 تغییر زبان</button>
<button onclick="newChat()">🆕 چت جدید</button>
<button onclick="generateImage()">🖼 ساخت تصویر</button>
</div>
</header>

<div id="chatBox"></div>

<footer>
<input id="userInput" placeholder="پیام بنویس...">
<button class="send-btn" onclick="sendMessage()">➤</button>
</footer>

<script>
const CHAT_URL="https://api.gapgpt.app/v1/chat/completions";
const CHAT_API_KEY="YOUR_KEY";
const KIE_URL="https://api.kie.ai/api/v1/jobs/createTask";
const KIE_API_KEY="YOUR_KEY";

let lang="fa";

function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="flex"?"none":"flex";
}

function toggleMode(){
  document.body.classList.toggle("light");
}

function toggleLang(){
  lang=lang==="fa"?"en":"fa";
  document.documentElement.lang=lang;
  document.getElementById("logo").innerText=lang==="fa"?"نورا":"Nora AI";
  document.getElementById("userInput").placeholder=
    lang==="fa"?"پیام بنویس...":"Type a message...";
}

function newChat(){
  document.getElementById("chatBox").innerHTML="";
}

function addMessage(role,text,img=null){
  const div=document.createElement("div");
  div.className="message "+role;
  div.innerText=text;
  if(img){
    const image=document.createElement("img");
    image.src=img;
    image.className="generated";
    div.appendChild(image);
  }
  document.getElementById("chatBox").appendChild(div);
  document.getElementById("chatBox").scrollTop=999999;
}

async function sendMessage(){
  const input=document.getElementById("userInput");
  const msg=input.value.trim();
  if(!msg)return;
  addMessage("user",msg);
  input.value="";
  addMessage("bot","...");
  try{
    const res=await fetch(CHAT_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+CHAT_API_KEY
      },
      body:JSON.stringify({model:"gpt-4o",messages:[{role:"user",content:msg}]})
    });
    const data=await res.json();
    document.querySelectorAll(".bot").forEach(b=>b.remove());
    addMessage("bot",data.choices[0].message.content);
  }catch{
    addMessage("bot","❌ Error");
  }
}

async function generateImage(){
  const input=document.getElementById("userInput");
  const msg=input.value.trim();
  if(!msg)return;
  addMessage("user",msg);
  input.value="";
  addMessage("bot","🎨 Generating...");
  try{
    const res=await fetch(KIE_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+KIE_API_KEY
      },
      body:JSON.stringify({
        model:"nano-banana-pro",
        input:{prompt:msg,aspect_ratio:"1:1",resolution:"1K"}
      })
    });
    const data=await res.json();
    document.querySelectorAll(".bot").forEach(b=>b.remove());
    if(data.output_url){
      addMessage("bot","",data.output_url);
    }else{
      addMessage("bot","❌ Failed");
    }
  }catch{
    addMessage("bot","❌ Error");
  }
}

document.getElementById("userInput")
.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});
</script>

</body>
</html>
