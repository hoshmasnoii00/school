<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}

:root{
--bg1:#050505;
--bg2:#0f0f18;
--accent:#00e0ff;
--accent2:#8b5cf6;
--text:#fff;
--glass:rgba(20,20,30,.9);
--border:rgba(255,255,255,.08);
--user:rgba(0,120,255,.15);
--bot:rgba(150,50,255,.15);
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:radial-gradient(circle at center,#111 0%,#050505 80%);
color:var(--text);
overflow:hidden;
}

/* HEADER */
header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:var(--glass);
border-bottom:1px solid var(--border);
position:fixed;
top:0;
width:100%;
z-index:10;
backdrop-filter:blur(10px);
}

.logo{
font-weight:800;
font-size:1.4rem;
background:linear-gradient(90deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
color:transparent;
}

/* CHAT AREA */
.chat-container{
flex:1;
margin-top:60px;
margin-bottom:70px;
overflow-y:auto;
padding:20px 15px;
scroll-behavior:smooth;
}

.message{
max-width:85%;
padding:12px 14px;
margin-bottom:12px;
border-radius:18px;
line-height:1.6;
animation:fade .2s ease;
word-wrap:break-word;
}

.user{
background:var(--user);
margin-left:auto;
border:1px solid rgba(0,120,255,.2);
}

.bot{
background:var(--bot);
margin-right:auto;
border:1px solid rgba(150,50,255,.2);
}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1;transform:translateY(0)}
}

/* FOOTER */
footer{
height:70px;
position:fixed;
bottom:0;
width:100%;
display:flex;
align-items:center;
padding:10px;
background:var(--glass);
border-top:1px solid var(--border);
backdrop-filter:blur(10px);
}

.input-box{
flex:1;
display:flex;
background:#111;
border-radius:30px;
padding:6px 10px;
align-items:center;
}

input{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:15px;
padding:8px;
}

/* SEND BUTTON */
.send-btn{
width:42px;
height:42px;
border-radius:50%;
border:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
background:#333;
color:#777;
transition:.2s;
}

.send-btn.active{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:white;
box-shadow:0 0 10px rgba(0,224,255,.5);
}

.send-btn:hover{transform:scale(1.08)}
.send-btn:active{transform:scale(.92)}

.send-btn svg{
width:20px;
height:20px;
}

/* Scrollbar */
.chat-container::-webkit-scrollbar{
width:6px;
}
.chat-container::-webkit-scrollbar-thumb{
background:linear-gradient(var(--accent),var(--accent2));
border-radius:10px;
}

/* Responsive */
@media(min-width:768px){
.chat-container{padding:30px 25%;}
}
</style>
</head>

<body>

<header>
<div class="logo">Country AI</div>
</header>

<div class="chat-container" id="chat"></div>

<footer>
<div class="input-box">
<input type="text" id="messageInput" placeholder="پیامت رو بنویس...">
<button class="send-btn" id="sendBtn">
<svg viewBox="0 0 24 24" fill="currentColor">
<path d="M12 5l-7 7h4v7h6v-7h4z"/>
</svg>
</button>
</div>
</footer>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("messageInput");
const btn=document.getElementById("sendBtn");

let messages=JSON.parse(localStorage.getItem("countryAI"))||[];

function save(){
localStorage.setItem("countryAI",JSON.stringify(messages));
}

function render(){
chat.innerHTML="";
messages.forEach(m=>{
const div=document.createElement("div");
div.className="message "+m.role;
div.textContent=m.text;
chat.appendChild(div);
});
chat.scrollTop=chat.scrollHeight;
}

function addMessage(text,role){
messages.push({text,role});
save();
render();
}

btn.onclick=send;
input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();
send();
}
});

input.addEventListener("input",()=>{
btn.classList.toggle("active",input.value.trim()!=="");
});

function send(){
const text=input.value.trim();
if(!text) return;
addMessage(text,"user");
input.value="";
btn.classList.remove("active");

/* اینجا API خودت صدا زده میشه */
/* من دست نزدم 😌 */

/* پاسخ تستی موقت */
setTimeout(()=>{
addMessage("پیامت دریافت شد.","bot");
},500);
}

render();
</script>

</body>
</html>
