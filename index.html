<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>tekno hosh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

    <!-- هدر -->
    <div class="header">
        <div class="logo">⚡ tekno <span>hosh</span></div>
        <div class="controls">
            <button id="themeToggle">🌙</button>
            <button id="langToggle">FA</button>
        </div>
    </div>

    <!-- پیام‌ها -->
    <div class="messages" id="messages"></div>

    <!-- ورودی -->
    <div class="input-area">
        <textarea id="userInput" placeholder="پیام خود را بنویسید..." rows="1"></textarea>
        <button id="sendBtn">ارسال</button>
    </div>

    <!-- لودینگ -->
    <div id="loadingSpinner">⏳ tekno hosh is thinking...</div>

</div>

<!-- فایل JS -->
<script src="script.js"></script>
</body>
</html>
