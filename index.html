<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
:root{--bg1:#000;--bg2:#0a0a0a;--text:#fff;--glass:rgba(25,25,35,.95);--border:rgba(255,255,255,.1);--accent:#00e0ff;--accent2:#a06eff;--user:rgba(0,100,255,.25);--bot:rgba(150,50,255,.25);--menu-bg:rgba(20,20,30,.98)}
.light{--bg1:#fff;--bg2:#f5f5ff;--text:#000;--glass:rgba(255,255,255,.95);--border:rgba(0,0,0,.1);--user:rgba(0,100,255,.1);--bot:rgba(150,50,255,.1);--menu-bg:rgba(250,250,255,.98)}
body{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(145deg,var(--bg1),var(--bg2));color:var(--text);overflow-x:hidden;transition:.3s}
header,footer{padding:14px 18px;background:var(--glass);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);z-index:10}
footer{border-top:1px solid var(--border);border-bottom:none;padding:12px 18px}
.logo{font-weight:700;font-size:1.8rem;background:linear-gradient(145deg,#fff,var(--accent),var(--accent2));-webkit-background-clip:text;color:transparent}
.header-content{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;width:100%}
.menu-btn{background:none;border:none;color:var(--text);font-size:2rem;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;transition:.2s}
.menu-btn:hover{background:var(--border)}
.menu-overlay{position:fixed;top:0;right:-100%;width:300px;height:100vh;background:var(--menu-bg);backdrop-filter:blur(15px);border-left:1px solid var(--border);transition:right .3s ease;z-index:1000;padding:20px;box-shadow:-5px 0 20px rgba(0,0,0,.3)}
.menu-overlay.active{right:0}
.menu-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid var(--border)}
.menu-header h3{font-size:1.4rem;background:linear-gradient(145deg,var(--accent),var(--accent2));-webkit-background-clip:text;color:transparent}
.close-menu{background:none;border:none;color:var(--text);font-size:2rem;cursor:pointer;width:40px;height:40px;border-radius:10px}
.close-menu:hover{background:var(--border)}
.menu-section{margin-bottom:25px}
.menu-section h4{margin-bottom:12px;color:rgba(255,255,255,.7);font-size:.95rem}
.light .menu-section h4{color:rgba(0,0,0,.6)}
.menu-item{width:100%;padding:12px 15px;background:var(--glass);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.2s;font-size:.95rem;margin-bottom:8px;text-align:right;display:flex;align-items:center;gap:10px}
.menu-item:hover{border-color:var(--accent);transform:translateX(-5px)}
.history-list{list-style:none;display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;margin-top:10px}
.history-item{padding:10px 12px;background:var(--glass);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:.2s;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.history-item:hover{border-color:var(--accent)}
.history-item.active{border-color:var(--accent);background:linear-gradient(145deg, rgba(0,224,255,.1), rgba(160,110,255,.1))}
.delete-chat{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:rgba(255,0,0,.2);color:#ff4444;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.history-item:hover .delete-chat{display:flex}
.backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:.2s;z-index:999}
.backdrop.active{opacity:1;visibility:visible}
main{flex:1;display:flex;flex-direction:column;max-width:1000px;margin:0 auto;width:100%;padding:20px}
.chat-container{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding:15px 0}
.message-wrapper{display:flex;flex-direction:column;max-width:85%}
.message-wrapper.user{align-self:flex-end}
.message-wrapper.bot{align-self:flex-start}
.message{padding:14px 18px;border-radius:24px;font-size:.95rem;line-height:1.5;word-wrap:break-word}
.message-wrapper.user .message{background:var(--user);border:1px solid var(--border);border-bottom-left-radius:6px}
.message-wrapper.bot .message{background:var(--bot);border:1px solid var(--border);border-bottom-right-radius:6px}
.copy-message-btn{background:none;border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:12px;font-size:.8rem;cursor:pointer;width:fit-content;margin-top:4px;transition:.2s}
.copy-message-btn:hover{background:var(--border)}
.typing-indicator{display:flex;gap:5px;padding:14px 18px;background:var(--bot);border:1px solid var(--border);border-radius:24px;border-bottom-right-radius:6px}
.typing-indicator span{width:8px;height:8px;background:var(--text);border-radius:50%;opacity:.6;animation:typing 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.input-area{display:flex;gap:8px;background:var(--glass);border:1px solid var(--border);border-radius:40px;padding:6px 6px 6px 18px;backdrop-filter:blur(10px)}
.input-area input{flex:1;background:none;border:none;color:var(--text);font-size:1rem;padding:12px 0;outline:none}
.input-area input::placeholder{color:rgba(255,255,255,.5)}
.light .input-area input::placeholder{color:rgba(0,0,0,.4)}
.send-btn{background:linear-gradient(145deg,var(--accent),var(--accent2));border:none;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;color:white;font-size:1.4rem}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(0,224,255,.4)}
.chat-start{text-align:center;color:rgba(255,255,255,.5);padding:40px 20px}
.light .chat-start{color:rgba(0,0,0,.4)}
@media (max-width:600px){.message-wrapper{max-width:90%}.menu-overlay{width:85%}}
</style>
</head>
<body>

<header>
<div class="header-content">
<button class="menu-btn" id="menuBtn">☰</button>
<div class="logo">Country AI</div>
<div style="width:44px"></div>
</div>
</header>

<div class="menu-overlay" id="menuOverlay">
<div class="menu-header">
<h3>منو</h3>
<button class="close-menu" id="closeMenu">✕</button>
</div>
<div class="menu-section">
<h4>📜 تاریخچه</h4>
<button class="menu-item" id="newChatBtnMenu"><span>➕</span> چت جدید</button>
<ul class="history-list" id="historyList"></ul>
</div>
<div class="menu-section">
<h4>⚙️ تنظیمات</h4>
<button class="menu-item" id="themeToggle"><span>🌓</span> تم</button>
</div>
</div>
<div class="backdrop" id="backdrop"></div>

<main>
<div class="chat-container" id="chatContainer"></div>
<footer>
<div class="input-area">
<input type="text" placeholder="سوال خود را بپرسید..." id="userInput">
<button class="send-btn" id="sendBtn">↑</button>
</div>
</footer>
</main>

<script>
// ========== API GapGPT (همون که خودت دادی) ==========
const API_URL = "https://api.gapgpt.app/v1/chat/completions";
const API_KEY = "sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa";

// ========== تنظیمات ==========
let theme = localStorage.getItem('theme') || 'dark';
let chats = JSON.parse(localStorage.getItem('chats')) || [];
let currentId = localStorage.getItem('currentId') || null;
let isTyping = false;
let typingEl = null;

if(theme === 'light') document.body.classList.add('light');

// ========== توابع پیام ==========
function addMessage(type, text, chatId = currentId) {
const chat = chats.find(c => c.id === chatId);
if(!chat) return;

chat.messages.push({type, text});

if(type === 'user' && chat.messages.filter(m => m.type === 'user').length === 1) {
chat.title = text.length > 25 ? text.slice(0,25)+'...' : text;
}

save();
if(chatId === currentId) renderChat();
}

function addMessageToUI(type, text) {
const chatBox = document.getElementById('chatContainer');
const wrap = document.createElement('div');
wrap.className = `message-wrapper ${type}`;

const msg = document.createElement('div');
msg.className = "message";
msg.textContent = text;
wrap.appendChild(msg);

const btn = document.createElement("button");
btn.className = "copy-message-btn";
btn.innerText = "📋 کپی";
btn.onclick = () => navigator.clipboard.writeText(text);
wrap.appendChild(btn);

chatBox.appendChild(wrap);
chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
if(isTyping) return;
isTyping = true;
const chatBox = document.getElementById('chatContainer');
typingEl = document.createElement("div");
typingEl.className = "message-wrapper bot";
const box = document.createElement("div");
box.className = "typing-indicator";
for(let i = 0; i < 3; i++) box.appendChild(document.createElement("span"));
typingEl.appendChild(box);
chatBox.appendChild(typingEl);
chatBox.scrollTop = chatBox.scrollHeight;
}

function hideTyping() {
if(typingEl) typingEl.remove();
isTyping = false;
}

// ========== API واقعی ==========
async function sendToAPI(message) {
try {
const res = await fetch(API_URL, {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": `Bearer ${API_KEY}`
},
body: JSON.stringify({
model: "gpt-4o",
messages: [{ role: "user", content: message }]
})
});
const data = await res.json();
return data.choices?.[0]?.message?.content || "⚠️ بدون پاسخ";
} catch(e) {
console.error(e);
return "❌ خطا در ارتباط با سرور";
}
}

// ========== ارسال پیام ==========
async function sendMessage() {
const input = document.getElementById('userInput');
const text = input.value.trim();
if(!text) return;

const chat = chats.find(c => c.id === currentId);
if(!chat) return;

input.value = "";
addMessage('user', text);
addMessageToUI('user', text);
showTyping();

const response = await sendToAPI(text);
hideTyping();
addMessage('bot', response);
addMessageToUI('bot', response);
}

// ========== ذخیره و بازیابی ==========
function save() {
localStorage.setItem('chats', JSON.stringify(chats));
localStorage.setItem('currentId', currentId);
localStorage.setItem('theme', theme);
}

function newChat() {
const chat = {
id: Date.now()+'',
title: 'چت جدید',
messages: []
};
chats.unshift(chat);
currentId = chat.id;
save();
renderChat();
renderHistory();
}

function renderChat() {
const chat = chats.find(c => c.id === currentId);
const container = document.getElementById('chatContainer');
if(!chat) { newChat(); return; }

container.innerHTML = '';
if(chat.messages.length === 0) {
container.innerHTML = '<div class="chat-start">به Country AI خوش آمدید! سوال خود را بپرسید.</div>';
} else {
chat.messages.forEach(m => {
const wrap = document.createElement('div');
wrap.className = `message-wrapper ${m.type}`;
const msg = document.createElement('div');
msg.className = "message";
msg.textContent = m.text;
wrap.appendChild(msg);
const btn = document.createElement("button");
btn.className = "copy-message-btn";
btn.innerText = "📋 کپی";
btn.onclick = () => navigator.clipboard.writeText(m.text);
wrap.appendChild(btn);
container.appendChild(wrap);
});
}
container.scrollTop = container.scrollHeight;
}

function renderHistory() {
const list = document.getElementById('historyList');
list.innerHTML = chats.slice(0,8).map(c => `
<li class="history-item ${c.id === currentId ? 'active' : ''}" data-id="${c.id}">
<span>${c.title}</span>
<span class="delete-chat" onclick="event.stopPropagation();deleteChat('${c.id}')">×</span>
</li>
`).join('');

document.querySelectorAll('.history-item').forEach(item => {
item.addEventListener('click', () => {
currentId = item.dataset.id;
save();
renderChat();
closeMenu();
});
});
}

function deleteChat(id) {
if(chats.length <= 1) {
chats = [];
newChat();
} else {
chats = chats.filter(c => c.id !== id);
if(currentId === id) currentId = chats[0].id;
save();
renderChat();
renderHistory();
}
}

// ========== منو ==========
const menu = document.getElementById('menuOverlay');
const backdrop = document.getElementById('backdrop');

function closeMenu() {
menu.classList.remove('active');
backdrop.classList.remove('active');
}

document.getElementById('menuBtn').onclick = () => {
menu.classList.add('active');
backdrop.classList.add('active');
renderHistory();
};
document.getElementById('closeMenu').onclick = closeMenu;
backdrop.onclick = closeMenu;

// ========== دکمه‌ها ==========
document.getElementById('newChatBtnMenu').onclick = () => {
newChat();
closeMenu();
};

document.getElementById('themeToggle').onclick = () => {
document.body.classList.toggle('light');
theme = document.body.classList.contains('light') ? 'light' : 'dark';
save();
closeMenu();
};

// ========== رویدادها ==========
document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('userInput').onkeypress = (e) => {
if(e.key === 'Enter') {
e.preventDefault();
sendMessage();
}
};

// ========== شروع ==========
if(chats.length === 0) newChat();
else renderChat();
</script>

</body>
</html>
