<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Nora AI · پایدار و سریع</title>
  <style>
    /* -------------------- RESET & VARIABLES -------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'system-ui', -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Dark mode - بدون ذرات، با رنگهای عمیق */
      --bg-start: #0c0b1a;
      --bg-end: #1e1a3a;
      --glass-bg: rgba(30, 25, 60, 0.7);
      --glass-blur: 12px;
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --text-primary: #f0f3ff;
      --text-secondary: #b0c0ff;
      --accent-glow: #00e0ff;
      --accent-glow2: #a06eff;
      --placeholder: #aab4dd;
      --send-btn-bg: rgba(255, 255, 255, 0.1);
      --message-user-glow: rgba(0, 224, 255, 0.3);
      --message-bot-glow: rgba(160, 110, 255, 0.4);
      --header-footer-bg: rgba(15, 12, 30, 0.8);
      --code-bg: rgba(0, 0, 0, 0.4);
      --copy-btn-bg: rgba(255,255,255,0.15);
    }

    .light {
      --bg-start: #d0e0ff;
      --bg-end: #f5d0ff;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-blur: 12px;
      --glass-border: rgba(180, 130, 255, 0.3);
      --glass-shadow: 0 8px 32px rgba(150, 100, 255, 0.15);
      --text-primary: #1a1035;
      --text-secondary: #452f6b;
      --accent-glow: #c154ff;
      --accent-glow2: #3b8eff;
      --placeholder: #7a6b9a;
      --send-btn-bg: rgba(255, 230, 250, 0.7);
      --message-user-glow: rgba(193, 84, 255, 0.4);
      --message-bot-glow: rgba(59, 142, 255, 0.4);
      --header-footer-bg: rgba(255, 240, 250, 0.8);
      --code-bg: rgba(240, 230, 255, 0.7);
      --copy-btn-bg: rgba(180, 140, 255, 0.3);
    }

    body {
      height: 100vh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end), #2a2355);
      background-size: 300% 300%;
      animation: smoothGradient 15s ease infinite;
      color: var(--text-primary);
      transition: background 0.3s, color 0.2s;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }

    @keyframes smoothGradient {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      background: var(--header-footer-bg);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      z-index: 15;
      flex-shrink: 0;
      width: 100%;
    }

    .logo {
      font-weight: 700;
      font-size: clamp(1.5rem, 6vw, 2.2rem);
      letter-spacing: 2px;
      background: linear-gradient(145deg, #fff, var(--accent-glow), #f0f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px var(--accent-glow);
      animation: logoPulse 3s infinite alternate;
      white-space: nowrap;
    }
    @keyframes logoPulse {
      0% { text-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow2); opacity: 0.9; }
      100% { text-shadow: 0 0 20px var(--accent-glow), 0 0 40px var(--accent-glow2), 0 0 60px #f0f; opacity: 1; }
    }

    /* ===== دکمه منو ===== */
    .menu-btn {
      font-size: 2rem;
      cursor: pointer;
      background: var(--glass-bg);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      transition: 0.2s;
      flex-shrink: 0;
    }
    .menu-btn:active {
      transform: scale(0.95);
      background: var(--accent-glow);
      color: #000;
    }

    /* ===== منوی اصلی ===== */
    .menu {
      position: absolute;
      top: 80px;
      left: 20px;
      right: 20px;
      max-width: min(350px, 90%);
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      border-radius: 32px;
      padding: 12px;
      display: none;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      z-index: 25;
    }

    .menu > button, .download-submenu button {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--glass-border);
      padding: clamp(12px, 3vw, 14px) clamp(15px, 4vw, 18px);
      border-radius: 28px;
      font-size: clamp(1rem, 4vw, 1.1rem);
      cursor: pointer;
      color: var(--text-primary);
      backdrop-filter: blur(5px);
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: right;
    }
    .menu > button:active, .download-submenu button:active {
      background: var(--accent-glow);
      color: #000;
      transform: scale(0.98);
    }

    .download-submenu {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 5px;
      margin-right: 20px;
    }
    .download-submenu.show {
      display: flex;
    }

    /* ===== CHAT AREA ===== */
    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: clamp(15px, 4vw, 20px) clamp(12px, 3vw, 18px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2.5vw, 14px);
      z-index: 5;
      scroll-behavior: smooth;
      direction: ltr;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: min(85%, 600px);
      padding: clamp(12px, 3vw, 16px) clamp(16px, 4vw, 22px);
      border-radius: clamp(25px, 5vw, 32px) clamp(25px, 5vw, 32px) clamp(25px, 5vw, 32px) clamp(10px, 3vw, 12px);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      color: var(--text-primary);
      line-height: 1.5;
      word-break: break-word;
      direction: rtl;
      text-align: start;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
    }

    .message.user {
      align-self: flex-end;
      border-radius: clamp(25px, 5vw, 32px) clamp(25px, 5vw, 32px) clamp(10px, 3vw, 12px) clamp(25px, 5vw, 32px);
      background: rgba(0, 180, 255, 0.25);
      box-shadow: 0 0 25px var(--message-user-glow);
    }

    .message.bot {
      align-self: flex-start;
      background: rgba(160, 110, 255, 0.2);
      box-shadow: 0 0 25px var(--message-bot-glow);
    }

    /* انیمیشن تایپ */
    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: clamp(12px, 3vw, 16px) clamp(16px, 4vw, 22px);
      background: var(--glass-bg);
      border-radius: 40px;
      width: fit-content;
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
    }
    .typing-indicator span {
      width: clamp(8px, 2vw, 10px);
      height: clamp(8px, 2vw, 10px);
      background: var(--accent-glow);
      border-radius: 50%;
      opacity: 0.7;
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* بخش کد */
    pre {
      background: var(--code-bg);
      padding: clamp(12px, 3vw, 15px);
      border-radius: 20px;
      overflow-x: auto;
      direction: ltr;
      text-align: left;
      font-family: 'Courier New', monospace;
      border: 1px solid var(--glass-border);
      margin: 12px 0 6px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: clamp(0.85rem, 3vw, 0.95rem);
    }
    .code-wrapper {
      position: relative;
    }
    .copy-btn {
      position: absolute;
      top: clamp(5px, 2vw, 10px);
      left: clamp(5px, 2vw, 10px);
      background: var(--copy-btn-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      border-radius: 30px;
      padding: clamp(4px, 1.5vw, 6px) clamp(10px, 3vw, 16px);
      font-size: clamp(0.75rem, 2.5vw, 0.85rem);
      cursor: pointer;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
      z-index: 6;
    }
    .copy-btn:active {
      background: var(--accent-glow);
      color: #000;
    }

    /* ===== FOOTER ===== */
    footer {
      padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 18px);
      backdrop-filter: blur(var(--glass-blur));
      background: var(--header-footer-bg);
      border-top: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      z-index: 15;
      flex-shrink: 0;
      width: 100%;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: clamp(8px, 2vw, 12px);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: clamp(4px, 1.5vw, 6px) clamp(4px, 1.5vw, 6px) clamp(4px, 1.5vw, 6px) clamp(12px, 3vw, 18px);
      border-radius: 60px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }
    .input-wrapper:focus-within {
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-primary);
      font-size: clamp(1rem, 4vw, 1.1rem);
      padding: clamp(10px, 2.5vw, 14px) 0;
      direction: rtl;
      min-width: 50px;
    }
    input::placeholder {
      color: var(--placeholder);
    }

    button.send-btn {
      width: clamp(48px, 12vw, 58px);
      height: clamp(48px, 12vw, 58px);
      border-radius: 50%;
      background: var(--send-btn-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: clamp(1.5rem, 5vw, 1.8rem);
      cursor: pointer;
      transition: 0.18s;
      backdrop-filter: blur(8px);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button.send-btn:active {
      transform: scale(0.95);
      background: var(--accent-glow);
      color: #000;
    }

    /* اسکرول بار */
    #chatBox::-webkit-scrollbar { width: 4px; }
    #chatBox::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 20px; }
    
    /* حالت دسکتاپ */
    @media (min-width: 768px) {
      .message { max-width: min(70%, 700px); }
      .menu { left: auto; right: 20px; }
    }
  </style>
</head>
<body>
<header>
  <div class="logo" id="logoText">✨ NØRΛ ⚡</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  
  <!-- منوی اصلی -->
  <div class="menu" id="menu">
    <button onclick="toggleMode()" id="themeBtn">🌗 تغییر تم</button>
    <button onclick="newChat()" id="newChatBtn">🆕 چت جدید</button>
    <button onclick="toggleLanguage()" id="langBtn">🌐 تغییر زبان</button>
    <button onclick="toggleDownloadSubmenu(event)" id="downloadBtn">📥 دانلود اپلیکیشن</button>
    <div class="download-submenu" id="downloadSubmenu">
      <button onclick="openDownloadLink('windows')" id="windowsBtn">🪟 نسخه ویندوز</button>
      <button onclick="openDownloadLink('android')" id="androidBtn">📱 نسخه اندروید</button>
    </div>
  </div>
</header>

<div id="chatBox" dir="rtl"></div>

<footer>
  <div class="input-wrapper">
    <input id="userInput" placeholder="پیام بنویس ..." dir="rtl">
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
  </div>
</footer>

<script>
  (function() {
    let lang = 'fa';
    let menuVisible = false;
    let downloadSubmenuVisible = false;
    let isTyping = false;
    let typingIndicatorDiv = null;

    // لینک‌های دانلود
    const DOWNLOAD_LINKS = {
      windows: 'https://nexclex.com/apps/nora-windows.exe',
      android: 'https://nexclex.com/apps/nora-android.apk'
    };

    // کلمات کلیدی برای تشخیص سوالات
    const KEYWORDS = {
      name: ['اسمت چیه', 'نام تو', 'who are you', 'your name', 'اسم شما', 'چی اسمت'],
      company: ['سازنده', 'شرکت', 'ساخت', 'creator', 'maker', 'company', 'who made', 'تولید', 'تکنو هوش', 'تکنوهوش']
    };

    const texts = {
      fa: {
        placeholder: 'پیام بنویس ...',
        newChat: '🆕 چت جدید',
        toggleTheme: '🌗 تغییر تم',
        toggleLang: '🌐 تغییر زبان',
        download: '📥 دانلود اپلیکیشن',
        windows: '🪟 نسخه ویندوز',
        android: '📱 نسخه اندروید',
        logo: '✨ NØRΛ ⚡',
        copy: '📋 کپی',
        copied: '✅ کپی شد',
        botName: 'من نورا هستم ✨',
        botCompany: 'من توسط شرکت تکنو هوش ساخته شدم 🏢'
      },
      en: {
        placeholder: 'Type a message...',
        newChat: '🆕 New Chat',
        toggleTheme: '🌗 Toggle Theme',
        toggleLang: '🌐 Change Language',
        download: '📥 Download App',
        windows: '🪟 Windows Version',
        android: '📱 Android Version',
        logo: '✨ NØRΛ ⚡',
        copy: '📋 Copy',
        copied: '✅ Copied',
        botName: 'I am Nora ✨',
        botCompany: 'I was created by Techno Hoshmand 🏢'
      }
    };

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const logoEl = document.getElementById('logoText');
    const menu = document.getElementById('menu');
    const downloadSubmenu = document.getElementById('downloadSubmenu');

    function applyUILanguage() {
      const t = texts[lang];
      userInput.placeholder = t.placeholder;
      logoEl.innerText = t.logo;
      document.getElementById('themeBtn').innerText = t.toggleTheme;
      document.getElementById('newChatBtn').innerText = t.newChat;
      document.getElementById('langBtn').innerText = t.toggleLang;
      document.getElementById('downloadBtn').innerText = t.download;
      document.getElementById('windowsBtn').innerText = t.windows;
      document.getElementById('androidBtn').innerText = t.android;
      
      document.documentElement.lang = lang === 'fa' ? 'fa' : 'en';
      document.documentElement.dir = lang === 'fa' ? 'rtl' : 'ltr';
    }

    // تشخیص پاسخ اختصاصی
    function getSpecialResponse(message) {
      const msg = message.toLowerCase();
      
      // بررسی اسم
      for (let keyword of KEYWORDS.name) {
        if (msg.includes(keyword)) {
          return texts[lang].botName;
        }
      }
      
      // بررسی شرکت سازنده
      for (let keyword of KEYWORDS.company) {
        if (msg.includes(keyword)) {
          return texts[lang].botCompany;
        }
      }
      
      return null;
    }

    window.openDownloadLink = function(platform) {
      const link = DOWNLOAD_LINKS[platform];
      if (link) window.open(link, '_blank');
      closeAllMenus();
    };

    window.toggleDownloadSubmenu = function(event) {
      event.stopPropagation();
      downloadSubmenuVisible = !downloadSubmenuVisible;
      downloadSubmenu.classList.toggle('show', downloadSubmenuVisible);
    };

    window.toggleMenu = function() {
      menuVisible = !menuVisible;
      menu.style.display = menuVisible ? 'flex' : 'none';
      if (!menuVisible) {
        downloadSubmenu.classList.remove('show');
        downloadSubmenuVisible = false;
      }
    };

    function closeAllMenus() {
      menu.style.display = 'none';
      menuVisible = false;
      downloadSubmenu.classList.remove('show');
      downloadSubmenuVisible = false;
    }

    window.toggleMode = function() {
      document.body.classList.toggle('light');
      closeAllMenus();
    };

    window.newChat = function() {
      chatBox.innerHTML = '';
      closeAllMenus();
      if (typingIndicatorDiv) hideTypingIndicator();
    };

    window.toggleLanguage = function() {
      lang = lang === 'fa' ? 'en' : 'fa';
      applyUILanguage();
      closeAllMenus();
    };

    document.addEventListener('click', (event) => {
      if (menuVisible && !event.target.closest('.menu') && !event.target.closest('.menu-btn')) {
        closeAllMenus();
      }
    });

    function setupCopyButtons() {
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.onclick = function(e) {
          e.stopPropagation();
          const codeId = this.dataset.target;
          const codeEl = document.getElementById(codeId);
          if (codeEl) {
            navigator.clipboard.writeText(codeEl.innerText).then(() => {
              const original = this.innerText;
              this.innerText = texts[lang].copied;
              setTimeout(() => { this.innerText = original; }, 1500);
            });
          }
        };
      });
    }

    function addMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;

      if (text.includes('```')) {
        let parts = text.split(/(```[\s\S]*?```)/g);
        parts.forEach(part => {
          if (part.startsWith('```') && part.endsWith('```')) {
            const codeContent = part.slice(3, -3).replace(/^[a-z]*\n/, '');
            const wrapper = document.createElement('div');
            wrapper.className = 'code-wrapper';
            const id = 'code-' + Math.random().toString(36).substring(2, 9);
            const pre = document.createElement('pre');
            pre.id = id;
            pre.textContent = codeContent;
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.dataset.target = id;
            copyBtn.innerText = texts[lang].copy;
            wrapper.appendChild(pre);
            wrapper.appendChild(copyBtn);
            msgDiv.appendChild(wrapper);
          } else if (part.trim()) {
            msgDiv.appendChild(document.createTextNode(part));
          }
        });
      } else {
        msgDiv.textContent = text;
      }

      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      setupCopyButtons();
    }

    function showTypingIndicator() {
      if (isTyping) return;
      isTyping = true;
      typingIndicatorDiv = document.createElement('div');
      typingIndicatorDiv.className = 'typing-indicator';
      for (let i = 0; i < 3; i++) {
        typingIndicatorDiv.appendChild(document.createElement('span'));
      }
      chatBox.appendChild(typingIndicatorDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTypingIndicator() {
      if (typingIndicatorDiv?.parentNode) {
        typingIndicatorDiv.remove();
      }
      isTyping = false;
    }

    window.sendMessage = async function() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage('user', message);
      userInput.value = '';

      // بررسی پاسخ اختصاصی
      const specialResponse = getSpecialResponse(message);
      if (specialResponse) {
        setTimeout(() => {
          addMessage('bot', specialResponse);
        }, 500);
        return;
      }

      showTypingIndicator();

      try {
        const response = await fetch('https://api.gapgpt.app/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa'
          },
          body: JSON.stringify({
            model: 'gpt-4o',
            messages: [{ role: 'user', content: message }]
          })
        });

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || '⚠️ بدون پاسخ';
        hideTypingIndicator();
        addMessage('bot', reply);
      } catch (error) {
        hideTypingIndicator();
        addMessage('bot', '❌ خطا در ارتباط');
      }
    };

    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    applyUILanguage();
  })();
</script>
</body>
</html>
