<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tekno hosh</title>
<style>
/* ===== TEKNO HOSH NEO THEME ===== */
body{margin:0;padding:0;font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:white;overflow-x:hidden;}
body.techno-light{background:#f4f6ff;color:#111;}
body::before{content:"";position:fixed;width:200%;height:200%;background:radial-gradient(#00f2ff22 1px,transparent 1px);background-size:40px 40px;animation:moveBg 20s linear infinite;z-index:-1;}
@keyframes moveBg{from{transform:translate(0,0);}to{transform:translate(-200px,-200px);}}
.chat-container{width:95%;max-width:900px;margin:20px auto;background:rgba(0,0,0,0.1);border-radius:25px;padding:10px;box-shadow:0 20px 50px rgba(0,0,0,0.7);}
.header{display:flex;justify-content:center;align-items:center;padding:15px;}
.logo{font-size:24px;font-weight:bold;color:#00f2ff;letter-spacing:2px;animation:glow 1.5s infinite alternate;text-align:center;}
.logo span{color:#ff00ff;}
@keyframes glow{from{text-shadow:0 0 10px #00f2ff;}to{text-shadow:0 0 30px #00f2ff,0 0 50px #007bff;}}
.messages{max-height:60vh;overflow-y:auto;padding:15px;}
.message{margin-bottom:15px;display:flex;}
.user-message{justify-content:flex-end;}
.ai-message{justify-content:flex-start;}
.message-content{max-width:70%;padding:12px 18px;border-radius:18px;font-size:15px;line-height:1.6;animation:messageEnter 0.5s ease;}
.user-message .message-content{background:linear-gradient(135deg,#00f2ff,#007bff);color:white;}
.ai-message .message-content{background:rgba(255,255,255,0.1);color:white;}
@keyframes messageEnter{from{opacity:0;transform:translateY(20px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.input-area{display:flex;align-items:center;gap:10px;margin-top:10px;position:relative;}
.input-area textarea{flex:1;padding:12px;border-radius:15px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:white;resize:none;}
#sendBtn{padding:12px 20px;border:none;border-radius:15px;font-weight:bold;background:linear-gradient(135deg,#00f2ff,#007bff);color:white;cursor:pointer;transition:0.3s;}
#sendBtn:hover{transform:translateY(-2px);box-shadow:0 0 25px #00f2ff;}
.input-controls{display:flex;flex-direction:row;gap:8px;position:absolute;right:10px;bottom:0;}
#themeToggle,#langToggle{padding:6px 12px;border:none;border-radius:25px;cursor:pointer;font-weight:bold;background:#00f2ff;box-shadow:0 0 15px #00f2ff;transition:0.3s;}
#themeToggle:hover,#langToggle:hover{transform:scale(1.1);box-shadow:0 0 25px #00f2ff;}
#loadingSpinner{display:none;text-align:center;margin:10px 0;opacity:0.7;}
@media(max-width:600px){.message-content{max-width:90%;}.input-area{flex-direction:column;align-items:stretch;}.input-controls{position:static;justify-content:flex-end;margin-top:5px;}}
</style>
</head>
<body class="techno-dark">
<div class="chat-container">
    <div class="header">
        <div class="logo" id="logo">⚡ tekno <span>hosh</span></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <textarea id="userInput" placeholder="پیام خود را بنویسید..." rows="1"></textarea>
        <button id="sendBtn">ارسال</button>
        <div class="input-controls">
            <button id="themeToggle">🌙</button>
            <button id="langToggle">FA</button>
        </div>
    </div>
    <div id="loadingSpinner">⏳ tekno hosh is thinking...</div>
</div>
<script>
const API_URL = "https://api.gapgpt.app/v1/chat/completions";
const MODEL = "gpt-4o";
let API_KEY = "sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa"; // <-- api
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const spinner = document.getElementById("loadingSpinner");
const logo = document.getElementById("logo");

let messages = [{role:"system",content:"تو یک دستیار مفید و دوستانه هستی."}];

let currentLang = "fa";
const translations = {
    fa:{placeholder:"پیام خود را بنویسید...",send:"ارسال",logo:"⚡ تکنو هوش"},
    en:{placeholder:"Type your message...",send:"Send",logo:"⚡ tekno hosh"}
};

function updateLanguage(){
    input.placeholder = translations[currentLang].placeholder;
    sendBtn.textContent = translations[currentLang].send;
    document.getElementById("langToggle").textContent = currentLang==="fa"?"EN":"FA";
    logo.textContent = translations[currentLang].logo;
}
document.getElementById("langToggle").onclick = ()=>{
    currentLang = currentLang==="fa"?"en":"fa";
    updateLanguage();
};
updateLanguage();

document.getElementById("themeToggle").onclick = ()=>{
    document.body.classList.toggle("techno-light");
    document.body.classList.toggle("techno-dark");
    document.getElementById("themeToggle").textContent = document.body.classList.contains("techno-dark")?"🌙":"☀️";
};

function typeEffect(element,text,speed=20){
    element.textContent="";
    let i=0;
    spinner.style.display="block";
    const interval=setInterval(()=>{
        element.textContent+=text[i];
        i++;
        if(i>=text.length){clearInterval(interval);spinner.style.display="none";}
    },speed);
}

function addMessage(text,sender){
    const div=document.createElement("div");
    div.className="message "+(sender==="user"?"user-message":"ai-message");
    const bubble=document.createElement("div");
    bubble.className="message-content";
    div.appendChild(bubble);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop=messagesDiv.scrollHeight;
    if(sender==="assistant") typeEffect(bubble,text);
    else bubble.textContent=text;
}

async function sendMessage(){
    const msg=input.value.trim();
    if(!msg) return;
    addMessage(msg,"user");
    input.value="";
    messages.push({role:"user",content:msg});
    spinner.style.display="block";
    try{
        const res=await fetch(API_URL,{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${API_KEY}`},
            body:JSON.stringify({model:MODEL,messages:messages,temperature:0.7})
        });
        const data=await res.json();
        const aiMsg=data.choices[0].message.content;
        addMessage(aiMsg,"assistant");
        messages.push({role:"assistant",content:aiMsg});
    }catch(err){addMessage("❌ خطا: "+err.message,"assistant");spinner.style.display="none";}
}

sendBtn.addEventListener("click",sendMessage);
input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
</script>
</body>
</html>
