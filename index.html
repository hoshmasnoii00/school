<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}

:root{
--bg:#000;
--panel:#1c1c1e;
--text:#fff;
--sub:#aaa;
--border:rgba(255,255,255,.1);
--accent:#fff;
}

.light{
--bg:#f2f2f2;
--panel:#ffffff;
--text:#000;
--sub:#555;
--border:rgba(0,0,0,.1);
--accent:#000;
}

body{
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
transition:.2s;
overflow:hidden;
}

/* ===== Top Buttons ===== */
.top-btn{
position:fixed;
top:20px;
width:46px;
height:46px;
border-radius:50%;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
color:var(--text);
z-index:10;
}

.menu-btn{right:20px;}
.new-btn{left:20px;}

.top-btn:hover{background:rgba(255,255,255,.2);}

/* ===== Center Welcome ===== */
.center-text{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:var(--sub);
text-align:center;
padding:20px;
}

/* ===== Chat Area ===== */
main{
flex:1;
overflow-y:auto;
padding:80px 20px 120px 20px;
}

.chat-container{
max-width:750px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
}

.message{
font-size:15px;
line-height:1.7;
white-space:pre-wrap;
}

.user{text-align:left;}
.bot{text-align:right;}

/* ===== Input Panel ===== */
footer{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
}

.input-wrapper{
width:90%;
max-width:750px;
background:var(--panel);
border-radius:40px;
display:flex;
align-items:center;
padding:8px 12px;
border:1px solid var(--border);
}

.input-wrapper input{
flex:1;
background:none;
border:none;
outline:none;
color:var(--text);
font-size:15px;
padding:10px;
}

.input-wrapper input::placeholder{
color:var(--sub);
}

.send-btn{
width:44px;
height:44px;
border-radius:50%;
border:none;
background:var(--accent);
color:var(--bg);
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.send-btn:hover{opacity:.8}

/* ===== Sidebar ===== */
.sidebar{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:var(--panel);
border-left:1px solid var(--border);
transition:.3s;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
z-index:20;
}

.sidebar.active{right:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.4);
opacity:0;
visibility:hidden;
transition:.2s;
z-index:15;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.menu-item{
background:rgba(255,255,255,.05);
padding:10px 12px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.history{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}
</style>
</head>

<body>

<!-- Top Buttons -->
<div class="top-btn menu-btn" id="menuBtn">☰</div>
<div class="top-btn new-btn" id="newChatBtn">＋</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<div class="menu-item" id="themeToggle">🌓 تغییر تم</div>
<div class="history" id="historyList"></div>
</div>
<div class="overlay" id="overlay"></div>

<main>
<div class="center-text" id="welcomeText">چطور می‌توانم کمکتان کنم؟</div>
<div class="chat-container" id="chatContainer"></div>
</main>

<footer>
<div class="input-wrapper">
<input type="text" placeholder="پیام خود را بنویسید..." id="userInput">
<button class="send-btn" id="sendBtn">↑</button>
</div>
</footer>

<script>
// ===== API (دست نخورده) =====
const API_URL = "https://api.gapgpt.app/v1/chat/completions";
const API_KEY = "sk-dYCxLxwxD2rzT9NqR9GSSYCx3fRJdpUNejqKsXKTDFpZg2Xa";

let chats=[];
let currentId=null;

function save(){
localStorage.setItem("chats",JSON.stringify(chats));
localStorage.setItem("currentId",currentId);
}

function newChat(){
const chat={id:Date.now()+'',messages:[],title:"چت جدید"};
chats.unshift(chat);
currentId=chat.id;
save();
renderChat();
renderHistory();
}

function renderChat(){
const chat=chats.find(c=>c.id===currentId);
const box=document.getElementById("chatContainer");
const welcome=document.getElementById("welcomeText");
box.innerHTML="";
if(!chat || chat.messages.length===0){
welcome.style.display="flex";
return;
}
welcome.style.display="none";
chat.messages.forEach(m=>{
const div=document.createElement("div");
div.className="message "+m.type;
div.textContent=m.text;
box.appendChild(div);
});
box.scrollTop=box.scrollHeight;
}

function renderHistory(){
const list=document.getElementById("historyList");
list.innerHTML="";
chats.forEach(c=>{
const item=document.createElement("div");
item.className="menu-item";
item.textContent=c.title;
item.onclick=()=>{
currentId=c.id;
save();
renderChat();
closeSidebar();
};
list.appendChild(item);
});
}

async function sendToAPI(message){
try{
const res=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:"gpt-4o",
messages:[{role:"user",content:message}]
})
});
const data=await res.json();
return data.choices?.[0]?.message?.content || "⚠️ بدون پاسخ";
}catch{
return "❌ خطا در ارتباط با سرور";
}
}

async function sendMessage(){
const input=document.getElementById("userInput");
const text=input.value.trim();
if(!text)return;
const chat=chats.find(c=>c.id===currentId);
chat.messages.push({type:"user",text});
if(chat.messages.length===1) chat.title=text.slice(0,20);
input.value="";
renderChat();
const response=await sendToAPI(text);
chat.messages.push({type:"bot",text:response});
save();
renderChat();
renderHistory();
}

document.getElementById("sendBtn").onclick=sendMessage;
document.getElementById("userInput").onkeypress=e=>{
if(e.key==="Enter"){e.preventDefault();sendMessage();}
};

document.getElementById("newChatBtn").onclick=newChat;

const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

document.getElementById("menuBtn").onclick=()=>{
sidebar.classList.add("active");
overlay.classList.add("active");
};

function closeSidebar(){
sidebar.classList.remove("active");
overlay.classList.remove("active");
}
overlay.onclick=closeSidebar;

document.getElementById("themeToggle").onclick=()=>{
document.body.classList.toggle("light");
};

if(localStorage.getItem("chats")){
chats=JSON.parse(localStorage.getItem("chats"));
currentId=localStorage.getItem("currentId");
}

if(!chats.length)newChat();
else{renderChat();renderHistory();}
</script>

</body>
</html>
