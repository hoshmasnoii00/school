<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nora AI Ultra</title>

<style>
:root{
  --text:#ffffff;
  --glass: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.25);
  --accent:#00f0ff;
}

.light{
  --text:#1a1a1a;
  --glass: rgba(255,255,255,0.4);
  --border: rgba(255,255,255,0.7);
  --accent:#0077ff;
}

/* Animated Aurora Background */
body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#0f2027);
  background-size:400% 400%;
  animation:aurora 15s ease infinite;
  transition:0.4s;
}

.light{
  background:linear-gradient(-45deg,#dfe9f3,#f5f7fa,#e3f2fd,#f1f8ff);
}

@keyframes aurora{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Floating particles */
body::after{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.1) 1px,transparent 1px);
  background-size:50px 50px;
  animation:moveParticles 60s linear infinite;
  pointer-events:none;
}

@keyframes moveParticles{
  from{transform:translate(0,0);}
  to{transform:translate(-200px,-200px);}
}

/* Header */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  backdrop-filter: blur(30px);
  background:var(--glass);
  border-bottom:1px solid var(--border);
  box-shadow:0 0 30px rgba(0,240,255,0.2);
  position:relative;
  z-index:2;
}

.logo{
  font-weight:bold;
  letter-spacing:1px;
}

/* Menu */
.menu-btn{
  font-size:22px;
  cursor:pointer;
}

.menu{
  position:absolute;
  top:70px;
  right:20px;
  backdrop-filter: blur(40px);
  background:var(--glass);
  border-radius:20px;
  padding:15px;
  display:none;
  flex-direction:column;
  gap:12px;
  border:1px solid var(--border);
  box-shadow:0 0 40px rgba(0,240,255,0.4);
  animation:fadeIn 0.3s ease;
}

.menu button{
  background:var(--glass);
  border:1px solid var(--border);
  padding:10px;
  border-radius:15px;
  cursor:pointer;
  color:var(--text);
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

.menu button:hover{
  box-shadow:0 0 25px var(--accent);
  transform:scale(1.05);
}

/* Ripple Effect */
.menu button::after{
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  transform:translate(-50%,-50%);
  top:50%;
  left:50%;
  transition:width 0.4s ease,height 0.4s ease;
}

.menu button:active::after{
  width:200px;
  height:200px;
}

/* Chat */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:20px;
  z-index:2;
}

.message{
  margin-bottom:15px;
  padding:15px;
  border-radius:25px;
  backdrop-filter: blur(30px);
  background:var(--glass);
  border:1px solid var(--border);
  animation:slideUp 0.4s ease;
}

.user{
  box-shadow:0 0 20px rgba(0,240,255,0.4);
}

.bot{
  box-shadow:0 0 20px rgba(255,0,255,0.4);
}

/* Footer */
footer{
  padding:15px;
  backdrop-filter: blur(30px);
  background:var(--glass);
  border-top:1px solid var(--border);
  z-index:2;
}

.input-wrapper{
  display:flex;
  background:var(--glass);
  padding:8px;
  border-radius:30px;
  border:1px solid var(--border);
  box-shadow:0 0 25px rgba(0,240,255,0.3);
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  color:var(--text);
  padding:12px;
}

button.send-btn{
  border:none;
  padding:10px 18px;
  border-radius:20px;
  background:var(--glass);
  color:var(--text);
  cursor:pointer;
  transition:0.3s;
  border:1px solid var(--border);
}

button.send-btn:hover{
  box-shadow:0 0 30px var(--accent);
  transform:scale(1.1);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="logo">Nora AI</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="menu" id="menu">
<button onclick="toggleMode()">🌗 تغییر تم</button>
<button onclick="newChat()">🆕 چت جدید</button>
</div>
</header>

<div id="chatBox"></div>

<footer>
<div class="input-wrapper">
<input id="userInput" placeholder="پیام بنویس...">
<button class="send-btn" onclick="sendMessage()">➤</button>
</div>
</footer>

<script>
function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="flex"?"none":"flex";
}

function toggleMode(){
  document.body.classList.toggle("light");
}

function newChat(){
  document.getElementById("chatBox").innerHTML="";
}

function addMessage(role,text){
  const div=document.createElement("div");
  div.className="message "+role;
  div.innerText=text;
  document.getElementById("chatBox").appendChild(div);
  document.getElementById("chatBox").scrollTop=999999;
}

function sendMessage(){
  const input=document.getElementById("userInput");
  if(!input.value.trim())return;
  addMessage("user",input.value);
  input.value="";
}
</script>

</body>
</html>
